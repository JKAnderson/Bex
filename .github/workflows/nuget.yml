on:
  push:
    tags: ['v*']

env:
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  NUGET_ID: JKAnderson.Bex

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Version
      run: echo "PACKAGE_VERSION=${GITHUB_REF_NAME/#v}" | tee $GITHUB_ENV

    - name: Pack
      run: dotnet pack --configuration Release /p:PackageId=${NUGET_ID} /p:Version=${PACKAGE_VERSION} --output .

    - name: Login
      id: login
      uses: NuGet/login@v1
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: Push
      run: dotnet nuget push ${NUGET_ID}.${PACKAGE_VERSION}.nupkg --source $NUGET_SOURCE --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
